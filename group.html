<!DOCTYPE html>
<html>
<head>
    <title>Counter</title>
</head>
<body>

    <h2 id="count">0</h2>
    <button onclick="increase()">+</button>

    <script>
        let count = 0;

        function increase() {
            count++;
            document.getElementById("count").innerText = count;
        }
    </script>

</body>
</html>
